<!DOCTYPE html> 
<html> 
<head> 
<meta charset="UTF-8"> 
<title>もぐTube</title>  

<style> 
body{   
  margin:0;   
  background:#0f0f0f;   
  color:white;   
  font-family:Arial; 
}  

  .header{   
    height:56px;   
    background:#202020;   
    display:flex;   
    align-items:center;   
    padding:0 16px;   
    font-size:22px;   
    font-weight:bold; 
  }  
  
  .search-bar{   
    display:flex;   
    padding:10px;   
    background:#181818; 
  }  
  
  .search-bar input{   
    flex:1;   
    padding:10px;   
    background:#121212;   
    border:none;   
    color:white;   
    font-size:16px; 
  }  
  
  .search-bar button{   
    padding:10px 16px;   
    border:none;   
    background:red;   
    color:white;   
    cursor:pointer; 
  }  
  
  .container{   
    display:flex;   
    height:calc(100vh - 112px); 
  }  
  
  .player{   
    flex:2;   
    padding:10px; 
  }  
  
  iframe{   
    width:100%;   
    height:100%;   
    border:none; 
  }  
  
  .sidebar{   
    flex:1;   
    overflow-y:auto;   
    padding:10px; 
  }  
  
  .video{   
    display:flex;   
    gap:10px;   
    background:#181818;   
    margin-bottom:10px;   
    padding:6px;   
    border-radius:6px;   
    cursor:pointer; 
  }  
  
  .video img{   
    width:140px;   
    border-radius:6px; 
  }  
  
  .video-title{   
    font-size:14px; 
  } 
  </style> 
  </head>  
  
  <body>  
  
  <div class="header"> 
  もぐTube 
  </div>   
  
  <div class="search-bar">   
    <input     
      id="searchInput"     
      placeholder="YouTube検索">   
    <button onclick="searchVideos()">     
      検索   
    </button> 
  </div>  
    
    <div class="container">    
      
      <div class="player">     
        <iframe       
          id="player"       
          src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          allowfullscreen>     
        </iframe>   
      </div>    
      
      <div class="sidebar" id="sidebar"></div>  
    
    </div>  
    
    <script>  
      
      const API_KEY = "AIzaSyB-_3Q0nPbaJqNUaIMNpakZ1loFDbyZwIQ";  
      
      function searchVideos(){    
        
        const query =     
          document.getElementById("searchInput").value;    
        
        if(!query) return;    
        
        fetch(     
          `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${query}&key=${API_KEY}`   
        )   
        .then(res => res.json())   
        .then(data => {      
          
          const sidebar =       
            document.getElementById("sidebar");      
          
          sidebar.innerHTML = "";      
          
          data.items.forEach(v => {        
            
            const videoId = v.id.videoId;       
            const title = v.snippet.title;        
            const div =         
              document.createElement("div");        
            
            div.className = "video";        
            
            div.innerHTML = `         
              <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg">         
              <div class="video-title">${title}</div>       
            `;        
            div.onclick = () => {          
              
              document.getElementById("player").src =           
                "https://www.youtube.com/embed/" + videoId;        
            };        
            
            sidebar.appendChild(div);      
          
          });    
        
        });  
      
      }  
    
    </script>  
  
  </body> 
  </html>
